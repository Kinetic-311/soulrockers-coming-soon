<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulRockers — Coming Soon</title>
<meta name="description" content="SoulRockers launches September 3, 2026.">
<style>
  :root {
    --bg: #05060a;
    --bg-glow: #0d1220;
    --fg: #f3f0e9;
    --muted: #8a8d99;
    --accent: #d4af37;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(ellipse at center, var(--bg-glow) 0%, var(--bg) 70%);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    max-width: 560px;
    width: 100%;
  }
  .logo {
    width: 120px;
    height: 120px;
    object-fit: contain;
    border-radius: 50%;
    box-shadow: 0 0 60px rgba(212, 175, 55, 0.15);
  }
  .wordmark {
    font-size: 1.75rem;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin: 0;
    color: var(--fg);
  }
  .tagline {
    font-size: 1rem;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.6;
    margin: 0;
    max-width: 440px;
  }
  .countdown {
    display: flex;
    gap: 18px;
    margin-top: 8px;
  }
  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 64px;
  }
  .unit .value {
    font-size: 2.1rem;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    line-height: 1;
  }
  .unit .label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
    margin: 4px 0;
  }
  .date-note {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.7;
    margin: 0;
  }
  @media (max-width: 420px) {
    .countdown { gap: 10px; }
    .unit { min-width: 52px; }
    .unit .value { font-size: 1.6rem; }
    .wordmark { font-size: 1.35rem; letter-spacing: 0.25em; }
  }
</style>
</head>
<body>
<main>
  <img class="logo" src="assets/logo.png" alt="SoulRockers logo">
  <h1 class="wordmark">SoulRockers</h1>
  <p class="tagline">Bridging the ancient wisdom of the Earth with the future of conscious technology.</p>
  <div class="divider"></div>
  <div class="countdown" id="countdown" aria-live="polite">
    <div class="unit"><span class="value" id="days">00</span><span class="label">Days</span></div>
    <div class="unit"><span class="value" id="hours">00</span><span class="label">Hours</span></div>
    <div class="unit"><span class="value" id="minutes">00</span><span class="label">Minutes</span></div>
    <div class="unit"><span class="value" id="seconds">00</span><span class="label">Seconds</span></div>
  </div>
  <p class="date-note">Launching September 3, 2026</p>
</main>
<script>
  var LAUNCH = new Date("2026-09-03T00:00:00");
  function pad(n) { return String(n).padStart(2, "0"); }
  function tick() {
    var now = new Date();
    var diff = LAUNCH - now;
    if (diff <= 0) {
      document.getElementById("days").textContent = "00";
      document.getElementById("hours").textContent = "00";
      document.getElementById("minutes").textContent = "00";
      document.getElementById("seconds").textContent = "00";
      return;
    }
    var days = Math.floor(diff / (1000 * 60 * 60 * 24));
    var hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    var minutes = Math.floor((diff / (1000 * 60)) % 60);
    var seconds = Math.floor((diff / 1000) % 60);
    document.getElementById("days").textContent = pad(days);
    document.getElementById("hours").textContent = pad(hours);
    document.getElementById("minutes").textContent = pad(minutes);
    document.getElementById("seconds").textContent = pad(seconds);
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
