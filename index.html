<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulRockers — Coming Soon</title>
<meta name="description" content="SoulRockers launches September 3, 2026.">
<style>
  :root {
    --bg: #05060a;
    --bg-glow: #0d1220;
    --fg: #f3f0e9;
    --muted: #8a8d99;
    --accent: #d4af37;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(ellipse at center, var(--bg-glow) 0%, var(--bg) 70%);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    max-width: 560px;
    width: 100%;
  }
  .logo {
    width: 120px;
    height: 120px;
    object-fit: contain;
    border-radius: 50%;
    box-shadow: 0 0 60px rgba(212, 175, 55, 0.15);
  }
  .wordmark {
    font-size: 1.75rem;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin: 0;
    color: var(--fg);
  }
  .tagline {
    font-size: 1rem;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.6;
    margin: 0;
    max-width: 440px;
  }
  .countdown {
    display: flex;
    gap: 18px;
    margin-top: 8px;
  }
  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 64px;
  }
  .unit .value {
    font-size: 2.1rem;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    line-height: 1;
  }
  .unit .label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
    margin: 4px 0;
  }
  .date-note {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.7;
    margin: 0;
  }
  .signup-form {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 360px;
    margin-top: 4px;
  }
  .signup-form input[type="email"] {
    flex: 1;
    min-width: 0;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 8px;
    color: var(--fg);
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .signup-form input[type="email"]::placeholder {
    color: var(--muted);
  }
  .signup-form input[type="email"]:focus {
    border-color: var(--accent);
  }
  .signup-form button {
    padding: 12px 22px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s ease;
  }
  .signup-form button:hover {
    opacity: 0.85;
  }
  .signup-form button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .signup-note {
    font-size: 0.8rem;
    color: var(--muted);
    margin: -14px 0 0 0;
    min-height: 1.2em;
  }
  .signup-note.error {
    color: #d47070;
  }
  .signup-confirm {
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--accent);
    margin: 0;
  }
  .donate-btn {
    padding: 12px 32px;
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(212, 175, 55, 0.35);
    transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
  }
  .donate-btn:hover {
    background: transparent;
    color: var(--accent);
    box-shadow: 0 0 32px rgba(212, 175, 55, 0.5);
  }
  .donate-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .donate-overlay.open { display: flex; }
  .donate-modal {
    position: relative;
    width: 100%;
    max-width: 380px;
    background: #0d1220;
    border: 1px solid rgba(212, 175, 55, 0.25);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
  }
  .donate-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    padding: 4px;
  }
  .donate-close:hover { color: var(--fg); }
  .donate-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 4px 0;
  }
  .donate-title {
    font-size: 1.3rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    margin: 0 0 16px 0;
  }
  .coin-select {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .coin-select button {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .coin-select button.active {
    border-color: var(--accent);
    background: rgba(212, 175, 55, 0.1);
    color: var(--accent);
  }
  .address-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px;
  }
  .address-label {
    font-size: 0.7rem;
    color: var(--muted);
    margin: 0 0 8px 0;
  }
  .address-value {
    font-size: 0.72rem;
    word-break: break-all;
    line-height: 1.5;
    margin: 0 0 12px 0;
    color: var(--fg);
  }
  .copy-btn {
    width: 100%;
    padding: 9px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .copy-btn:hover { background: var(--accent); color: var(--bg); }
  .donate-footnote {
    font-size: 0.65rem;
    color: var(--muted);
    opacity: 0.7;
    margin: 14px 0 0 0;
  }
  @media (max-width: 420px) {
    .countdown { gap: 10px; }
    .unit { min-width: 52px; }
    .unit .value { font-size: 1.6rem; }
    .wordmark { font-size: 1.35rem; letter-spacing: 0.25em; }
    .signup-form { flex-direction: column; }
  }
</style>
</head>
<body>
<main>
  <button type="button" class="donate-btn" id="donate-open">Donate</button>
  <img class="logo" src="assets/logo.png" alt="SoulRockers logo">
  <h1 class="wordmark">SoulRockers</h1>
  <p class="tagline">Bridging the ancient wisdom of the Earth with the future of conscious technology.</p>
  <div class="divider"></div>
  <div class="countdown" id="countdown" aria-live="polite">
    <div class="unit"><span class="value" id="days">00</span><span class="label">Days</span></div>
    <div class="unit"><span class="value" id="hours">00</span><span class="label">Hours</span></div>
    <div class="unit"><span class="value" id="minutes">00</span><span class="label">Minutes</span></div>
    <div class="unit"><span class="value" id="seconds">00</span><span class="label">Seconds</span></div>
  </div>
  <p class="date-note">Launching September 3, 2026</p>

  <form class="signup-form" id="signup-form">
    <input type="email" id="signup-email" name="email" placeholder="Your email address" required autocomplete="email">
    <button type="submit" id="signup-submit">Notify Me</button>
  </form>
  <p class="signup-note" id="signup-note"></p>
</main>
<p class="signup-confirm" id="signup-confirm" style="display:none;">Thanks — we'll be in touch.</p>

<div class="donate-overlay" id="donate-overlay">
  <div class="donate-modal">
    <button class="donate-close" id="donate-close" aria-label="Close">✕</button>
    <p class="donate-eyebrow">Support the Mission</p>
    <h2 class="donate-title">DONATE</h2>
    <div class="coin-select" id="coin-select">
      <button type="button" class="active" data-coin="btc">BTC</button>
      <button type="button" data-coin="eth">ETH</button>
      <button type="button" data-coin="xmr">XMR</button>
    </div>
    <div class="address-box">
      <p class="address-label" id="coin-label">Bitcoin Address</p>
      <p class="address-value" id="coin-address"></p>
      <button type="button" class="copy-btn" id="copy-btn">Copy Address</button>
    </div>
    <p class="donate-footnote">Direct wallet — 0% fees. Thank you for supporting the grid.</p>
  </div>
</div>
<script>
  var LAUNCH = new Date("2026-09-03T00:00:00");
  function pad(n) { return String(n).padStart(2, "0"); }
  function tick() {
    var now = new Date();
    var diff = LAUNCH - now;
    if (diff <= 0) {
      document.getElementById("days").textContent = "00";
      document.getElementById("hours").textContent = "00";
      document.getElementById("minutes").textContent = "00";
      document.getElementById("seconds").textContent = "00";
      return;
    }
    var days = Math.floor(diff / (1000 * 60 * 60 * 24));
    var hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    var minutes = Math.floor((diff / (1000 * 60)) % 60);
    var seconds = Math.floor((diff / 1000) % 60);
    document.getElementById("days").textContent = pad(days);
    document.getElementById("hours").textContent = pad(hours);
    document.getElementById("minutes").textContent = pad(minutes);
    document.getElementById("seconds").textContent = pad(seconds);
  }
  tick();
  setInterval(tick, 1000);

  var FORMSPREE_ENDPOINT = "https://formspree.io/f/mwvdgkkk";

  var form = document.getElementById("signup-form");
  var emailInput = document.getElementById("signup-email");
  var submitBtn = document.getElementById("signup-submit");
  var note = document.getElementById("signup-note");
  var confirm = document.getElementById("signup-confirm");

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    note.textContent = "";
    note.classList.remove("error");

    if (!FORMSPREE_ENDPOINT) {
      note.textContent = "Signups aren't connected yet — check back soon.";
      note.classList.add("error");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Sending…";

    fetch(FORMSPREE_ENDPOINT, {
      method: "POST",
      headers: { "Accept": "application/json" },
      body: new FormData(form),
    })
      .then(function (res) {
        if (res.ok) {
          form.style.display = "none";
          note.style.display = "none";
          confirm.style.display = "block";
        } else {
          return res.json().then(function (data) {
            throw new Error((data && data.errors && data.errors[0] && data.errors[0].message) || "Submission failed");
          });
        }
      })
      .catch(function (err) {
        note.textContent = "Something went wrong — please try again.";
        note.classList.add("error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Notify Me";
      });
  });

  var COINS = {
    btc: { label: "Bitcoin", address: "bc1qx4wsqt2pq4xczgaa0ngd4ypc5mm7xg0yusepm7" },
    eth: { label: "Ethereum", address: "0x6D59D120E22cDb9aaf4D2271AfC62795e7bDE0c1" },
    xmr: { label: "Monero", address: "45r6hnqiguT5vUhgzNqJspKMMCSAUtwaVf2C65WoBRoVQpMZrWaceucQMKpVk8fZgGgSTT3NkEpT4isV2SBSjuUtN1MULhG" },
  };

  var donateOpenBtn = document.getElementById("donate-open");
  var donateOverlay = document.getElementById("donate-overlay");
  var donateCloseBtn = document.getElementById("donate-close");
  var coinButtons = document.querySelectorAll("#coin-select button");
  var coinLabel = document.getElementById("coin-label");
  var coinAddress = document.getElementById("coin-address");
  var copyBtn = document.getElementById("copy-btn");
  var selectedCoin = "btc";

  function renderCoin(id) {
    selectedCoin = id;
    coinLabel.textContent = COINS[id].label + " Address";
    coinAddress.textContent = COINS[id].address;
    copyBtn.textContent = "Copy Address";
    coinButtons.forEach(function (btn) {
      btn.classList.toggle("active", btn.dataset.coin === id);
    });
  }

  donateOpenBtn.addEventListener("click", function () {
    renderCoin(selectedCoin);
    donateOverlay.classList.add("open");
  });
  donateCloseBtn.addEventListener("click", function () {
    donateOverlay.classList.remove("open");
  });
  donateOverlay.addEventListener("click", function (e) {
    if (e.target === donateOverlay) donateOverlay.classList.remove("open");
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") donateOverlay.classList.remove("open");
  });
  coinButtons.forEach(function (btn) {
    btn.addEventListener("click", function () { renderCoin(btn.dataset.coin); });
  });
  copyBtn.addEventListener("click", function () {
    navigator.clipboard.writeText(COINS[selectedCoin].address).then(function () {
      copyBtn.textContent = "Copied!";
      setTimeout(function () { copyBtn.textContent = "Copy Address"; }, 2000);
    });
  });
</script>
</body>
</html>
